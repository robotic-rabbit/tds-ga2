version: "3.8"

services:
  redis:
    image: redis:alpine
    container_name: redis-backend
    expose:
      - 6379
    restart: always

  api:
    build: .
    container_name: fastapi-api
    ports:
      - "8000:8000"
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis
    restart: always
